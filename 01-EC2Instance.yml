 - name: Create ec2 mechines
   hosts: local
   connection: local
   vars: 
    sg_id: sg-0d4ec8455aa672dab
    ami_id: ami-0220d79f3f480ecf5
    environment: dev
    instances:
    - mongodb
    - catalogue
    tasks:
    - name: 
      amazon.aws.ec2_instance:
        instance_type: "t3.micro"
        sg_id: "{{ sg_id }}"
        ami_id: "{{ ami_id }}"
        name: "{{ item }} - {{ environment}}"
        tags:
         project: roboshop
         Component: "{{ item }}"
         Environment: "{{ environment }}"
        Name: "{{ item }} - {{ environmemt}}"
      loop: "{{ instances }}"
      resgister: ec2_output

    - name: print the output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"    