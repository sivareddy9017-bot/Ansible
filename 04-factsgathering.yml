- name: facts gather # when Ansible master server is connection to Node server gather the information
  hosts: local
  connection: local
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: check redhat or not   
    ansible.buitin.debug:
      msg: "yes, it is redhat"
    when: ansible_facts.os_family =="Redhat"  
